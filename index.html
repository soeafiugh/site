<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証失敗</title>

<style>
body {
    margin: 0;
    font-family: "Helvetica Neue", sans-serif;
    background: #313338;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* メインカード */
.container {
    background: #2b2d31;
    width: 380px;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* アイコン */
.icon {
    width: 80px;
    height: 80px;
    background: #ed4245;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px;
    font-size: 40px;
    color: white;
    box-shadow: 0 0 15px rgba(237,66,69,0.6);
}

/* タイトル */
h1 {
    color: white;
    margin: 10px 0;
    font-size: 22px;
}

/* 説明 */
p {
    color: #b5bac1;
    font-size: 14px;
    margin-bottom: 20px;
}

/* ボタン */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #5865f2;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4752c4;
}

/* アニメーション */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 下のリンク */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #949ba4;
}

.footer a {
    color: #5865f2;
    text-decoration: none;
}

.footer a:hover {
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="container">
    <div class="icon">✖</div>

    <h1>認証に失敗しました</h1>
    <p>
        このアカウントの認証中に問題が発生しました。<br>
        もう一度やり直してください。
    </p>

    <button onclick="retry()">再試行</button>

    <div class="footer">
        問題が続く場合は <a href="#">サポート</a> にお問い合わせください
    </div>
</div>

<script>
function retry() {
    location.href = "/.netlify/functions/callback";
}
</script>

</body>
</html>
