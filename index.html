<!DOCTYPE html>
<html lang="ja">
<head>
  <meta property="og:title" content="らいあおさーばーの認証サイト">
  <meta property="og:description" content="このサイトにアクセスしてボタンをクリックするだけでらいあおサーバーでの認証ができます。">
  <meta property="og:image" content="https://cdn.discordapp.com/attachments/1485264819861848147/1489160981643792495/2026-04-02_161353.png?ex=69cf68bd&is=69ce173d&hm=075b27b049f28adc0d7bd0eac052038f33b54b6978357f7e6ebbc1c6b22e1b03">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証</title>

<style>
body {
    margin: 0;
    background: #313338;
    font-family: "gg sans", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* カード */
.card {
    background: #2b2d31;
    padding: 40px;
    width: 400px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    animation: fade 0.6s ease;
}

/* ロゴ */
.logo {
    font-size: 50px;
    margin-bottom: 15px;
}

/* タイトル */
h1 {
    color: white;
    font-size: 22px;
}

/* 説明 */
p {
    color: #b5bac1;
    font-size: 14px;
    margin-bottom: 25px;
}

/* ボタン */
button {
    width: 100%;
    padding: 14px;
    background: #5865f2;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4752c4;
}

/* ローディング */
.loading {
    display: none;
    margin-top: 15px;
    color: #b5bac1;
}

/* アニメ */
@keyframes fade {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">🌀</div>
    <h1>アカウント認証</h1>
    <p>続行するにはDiscordアカウントで認証してください</p>

    <button onclick="login()">Discordで認証</button>

    <div class="loading" id="loading">認証ページに移動中...</div>
</div>

<script>
function login() {
    document.getElementById("loading").style.display = "block";
    setTimeout(() => {
        location.href = "/.netlify/functions/callback";
    }, 500);
}
</script>

</body>
</html>
